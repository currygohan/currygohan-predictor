<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Prediction history — lottery board</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="theme-dark">
  <main>
    <nav class="site-nav" aria-label="Site sections">
      <a href="index.html" class="site-nav__tab">Draws &amp; picks</a>
      <a href="predictions.html" class="site-nav__tab site-nav__tab--current">Prediction history</a>
    </nav>

    <header class="page-header">
      <h1>Prediction history</h1>
      <p class="tagline">
        Logged Set A / Set B vs actual results when the draw has happened. Accuracy is hits out of 6 (five whites + bonus).
      </p>
    </header>

    <p class="disclaimer" role="note">
      <strong>Disclaimer:</strong> For entertainment only.
    </p>

    <section class="history-section" aria-labelledby="ph-heading">
      <h2 id="ph-heading" class="history-heading">Logged predictions</h2>
      <p id="ph-status" class="status" aria-live="polite">Loading…</p>
      <div id="ph-list" class="history-cards" role="list"></div>
    </section>

    <footer class="site-footer">
      Source: <code>data/prediction_history.csv</code>. <a href="index.html">Back to draws &amp; picks</a>.
    </footer>
  </main>
  <script type="module" src="js/predictionsPage.js"></script>
</body>
</html>
