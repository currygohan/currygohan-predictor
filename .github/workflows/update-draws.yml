name: Update lottery CSVs

on:
  schedule:
    # After typical US draw nights; adjust if needed (UTC).
    - cron: "40 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lottery-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Merge remote + official + existing data
        run: python scripts/update_lottery_csvs.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mega_millions.csv data/powerball.csv
          if git diff --staged --quiet; then
            echo "No CSV changes."
          else
            git commit -m "chore(data): update lottery draws"
            git push
          fi
