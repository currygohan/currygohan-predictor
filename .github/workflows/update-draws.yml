name: Update lottery CSVs

on:
  schedule:
    # Twice daily UTC: catches post-draw windows for US evening draws.
    - cron: "15 6,16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lottery-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Daily source: NY Open Data API only. Optional: set repo Actions variable
      # MERGE_OFFICIAL_CSV=true to also merge megamillions.csv / powerball.csv.
      - name: Fetch, validate, merge lottery CSVs
        env:
          MERGE_OFFICIAL_CSV: ${{ vars.MERGE_OFFICIAL_CSV }}
        run: python scripts/update_lottery_csvs.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mega_millions.csv data/powerball.csv
          if git diff --staged --quiet; then
            echo "No CSV changes."
          else
            git commit -m "chore(data): update lottery draws"
            git push
          fi
